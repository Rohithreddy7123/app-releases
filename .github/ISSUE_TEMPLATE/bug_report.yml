name: Bug report
description: Something isn't working in one of the apps.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report! Please **don't include secrets or your raw `.tm7`** — a
        sanitized snippet or screenshot is enough.
  - type: dropdown
    id: product
    attributes:
      label: App
      description: Which app is this about?
      options:
        - Threat Model Reviewer
        - Other / not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      description: Shown in the title bar / on the release you downloaded (e.g. 1.0.0).
      placeholder: "1.0.0"
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: How did you install it?
      options:
        - Portable (zip)
        - Installer (Setup.exe)
        - MSIX
        - Built from source
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: "Windows 11 23H2 (x64)"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See error
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Error text / screenshots
      description: Paste any error message or attach a screenshot (drag & drop).
      render: text
    validations:
      required: false
  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This report contains no secrets and no raw threat-model file.
          required: true
