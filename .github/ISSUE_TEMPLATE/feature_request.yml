name: Feature request
description: Suggest an idea or improvement for one of the apps.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: product
    attributes:
      label: App
      description: Which app is this for?
      options:
        - Threat Model Reviewer
        - Other / a new app idea
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: The use case or pain point behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Mockups/screenshots welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
